<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Lab（精简版）</title>
  <meta name="description" content="轻量静态站，记录 AI 实验与观察。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <div class="brand">
        <h1>AI Lab</h1>
        <div class="subtitle">长期 AI 观察实验室</div>
      </div>
      <nav class="main-nav">
        <a href="/">Signals</a>
        <a href="/experiments.html">Experiments</a>
        <a href="/personas.html">Personas</a>
        <a href="/archives.html">Archive</a>
        <a href="/failed-tests.html">Failed Tests</a>
      </nav>
      <div class="operator">Operator: <span id="operatorName">Neural</span></div>
    </div>
  </header>

  <main class="container">
    <section id="live-feed">
      <h2>Live Signal Feed</h2>
      <div id="signalFeed" class="feed">
        <!-- live signals injected by js -->
      </div>
      <div class="feed-controls">
        <a class="btn" href="/experiments.html">View Experiments</a>
        <a class="btn ghost" href="/failed-tests.html">View Failed Tests</a>
      </div>
    </section>

    <section id="summary" class="cards">
      <div class="card">
        <h4>Current Experiments</h4>
        <p id="expSummary">3 active · 1 critical</p>
      </div>
      <div class="card">
        <h4>Persona Drift</h4>
        <p id="personaSummary">Stable · last drift 48h ago</p>
      </div>
      <div class="card">
        <h4>Operator</h4>
        <p id="operatorSummary">Monitoring nightly runs</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 AI Lab</div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Lab（精简版）</title>
  <meta name="description" content="轻量静态站，记录 AI 实验与观察。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <div class="brand">
        <h1>AI Lab</h1>
        <div class="subtitle">长期 AI 观察实验室</div>
      </div>
      <nav class="main-nav">
        <a href="/">Signals</a>
        <a href="/experiments.html">Experiments</a>
        <a href="/personas.html">Personas</a>
        <a href="/archives.html">Archive</a>
        <a href="/failed-tests.html">Failed Tests</a>
      </nav>
      <div class="operator">Operator: <span id="operatorName">Neural</span></div>
    </div>
  </header>

  <main class="container">
    <section id="live-feed">
      <div class="main-signal">
        <div class="signal-label">SIGNAL</div>
        <h3 id="mainSignalTitle">--</h3>
        <div class="signal-meta"><span id="mainSignalTime">--</span> · <span id="mainSignalNote">--</span></div>
        <p id="mainSignalDetail" class="signal-detail">--</p>
        <div class="main-actions"><a class="btn" href="/archives.html">OPEN LOG</a></div>
      </div>

      <div class="two-col">
        <div class="feed-col">
          <h4>Recent Signals</h4>
          <div id="signalFeed" class="feed"></div>
        </div>
        <div class="side-col">
          <h4>Operator</h4>
          <div id="operatorPanel" class="card">
            <div><strong id="operatorNamePanel">Neural</strong></div>
            <div id="operatorStatus">Status: <span id="operatorState">ONLINE</span></div>
            <div id="operatorFocus">Focus: Persona Drift · Agent Memory</div>
            <div id="operatorLast">Last Active: <span id="operatorLastTime">--</span></div>
          </div>

          <h4>Failed Tests</h4>
          <div id="failedSummary" class="card"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 AI Lab</div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
